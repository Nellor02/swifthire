services:
  - type: web
    name: swifthire-backend
    env: python
    plan: standard
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "swifthire-backend.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app"
      - key: DJANGO_EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: "noreply@swifthire.com"
      - key: DATABASE_URL
        fromDatabase:
          name: swifthire-db
          property: connectionString

databases:
  - name: swifthire-db
    plan: basic-256mb